name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: Build and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tools
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install build twine
          python3 -m pip install -e .

      - name: Build source and wheel
        run: python3 -m build

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codex-gui-packages
          path: dist/

      - name: Publish package (if token is configured)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && github.ref_type == 'tag'
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "${PYPI_API_TOKEN:-}" ]; then
            echo "No PYPI_API_TOKEN configured. Package built and published artifacts are uploaded only."
            exit 0
          fi
          python3 -m twine upload --non-interactive dist/*
