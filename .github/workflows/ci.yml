name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install toolchain and test deps
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install --upgrade setuptools wheel
          python3 -m pip install -e .
          python3 -m pip install pytest

      - name: Run project quality gate
        run: bash scripts/ci-gate.sh

      - name: Upload quality report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-${{ runner.os }}-py${{ matrix.python-version }}
          path: |
            .config/codex-gui/
            .local/share/applications/codex-gui.desktop
          if-no-files-found: ignore
